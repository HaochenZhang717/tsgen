dataloader:
  batch_size: 64
  sample_size: 256
  shuffle: true
  test_dataset:
    coefficient: 0.01
    params:
      data_root: ../datasets/synthetic_u
      distribution: geometric
      name: mydataset
      period: test
      seed: 123
      split: test
      style: separate
      window: 128
    sampling_steps: 250
    step_size: 0.05
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
  train_dataset:
    params:
      data_root: ../datasets/synthetic_u
      name: mydataset
      period: train
      seed: 123
      split: train
      window: 128
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
model:
  params:
    attn_pd: 0.0
    beta_schedule: cosine
    d_model: 64
    feature_size: 1
    kernel_size: 1
    loss_type: l1
    mlp_hidden_times: 4
    n_heads: 4
    n_layer_dec: 3
    n_layer_enc: 4
    padding_size: 0
    resid_pd: 0.0
    sampling_timesteps: 1000
    seq_length: 128
    timesteps: 1000
  target: Models.interpretable_diffusion.gaussian_diffusion.Diffusion_TS
solver:
  base_lr: 1.0e-05
  ema:
    decay: 0.995
    update_interval: 10
  gradient_accumulate_every: 2
  max_epochs: 25000
  results_folder: ./Checkpoints_mydataset
  save_cycle: 2500
  scheduler:
    params:
      factor: 0.5
      min_lr: 1.0e-05
      patience: 5000
      threshold: 0.1
      threshold_mode: rel
      verbose: false
      warmup: 500
      warmup_lr: 0.0008
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
